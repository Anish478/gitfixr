<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>gitFixr</title>
  <style>
    body  { font-family: system-ui, sans-serif; width: 300px; padding: 16px; margin: 0; }
    h2    { font-size: 16px; margin: 0 0 12px; }
    #box  { padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; }
    .idle    { background: #f0f0f0; color: #555; }
    .running { background: #fff8e1; color: #b45309; }
    .success { background: #e6f4ea; color: #1a7f37; }
    .failed  { background: #fde8e8; color: #b91c1c; }
    #pr-link { display: none; margin-top: 12px; text-align: center; }
    #pr-link a { color: #238636; font-weight: bold; text-decoration: none; }
    #pr-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>🔧 gitFixr</h2>
  <div id="box" class="idle">Open a GitHub issue and let gitFixr fix it.</div>
  <div id="pr-link"><a id="pr-anchor" href="#" target="_blank">Open Pull Request →</a></div>
  <script src="sidebar.js"></script>
</body>
</html>
